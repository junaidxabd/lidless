# Lidless project definition — regenerate Lidless.xcodeproj with `make gen`
# (or `xcodegen generate`). The generated project is committed, so xcodegen
# is only needed when changing this file.
name: Lidless
options:
  bundleIdPrefix: com.lidless
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  LidlessCore:
    path: Packages/LidlessCore

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # Ad-hoc "Sign to Run Locally" by default so the project builds with no
    # Apple Developer account (Manual style: Automatic refuses entitlements
    # without a development certificate). For distribution, switch to your
    # team in Xcode's Signing pane — see README "Signing & notarization".
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: YES

targets:
  Lidless:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
      # The launchd plist ships inside the app bundle where SMAppService
      # expects it; BundleProgram points at the embedded helper binary.
      - path: Helper/Resources/com.lidless.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    settings:
      base:
        PRODUCT_NAME: Lidless
        PRODUCT_BUNDLE_IDENTIFIER: com.lidless.app
        INFOPLIST_FILE: App/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App-group entitlements need a signing team (provisioning); the
        # zero-account default builds without them — everything works except
        # the widget's live data. For distribution, set DEVELOPMENT_TEAM and
        # uncomment (see README "Signing & notarization"):
        # CODE_SIGN_ENTITLEMENTS: App/Resources/Lidless.entitlements
    dependencies:
      - package: LidlessCore
      - target: LidlessHelper
        embed: false
      - target: LidlessWidget
        embed: true
    postBuildScripts:
      - name: Embed Privileged Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS"
          mkdir -p "$DEST"
          /usr/bin/ditto "$BUILT_PRODUCTS_DIR/LidlessHelper" "$DEST/LidlessHelper"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/LidlessHelper
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/MacOS/LidlessHelper

  LidlessHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_NAME: LidlessHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.lidless.helper
        SKIP_INSTALL: YES
        # Standalone tools don't inherit the bundle id as their signing
        # identifier; pin it so the daemon has a stable, meaningful identity.
        OTHER_CODE_SIGN_FLAGS: --identifier com.lidless.helper
    dependencies:
      - package: LidlessCore

  LidlessWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget/Sources
    settings:
      base:
        PRODUCT_NAME: LidlessWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.lidless.app.widget
        INFOPLIST_FILE: Widget/Resources/Info.plist
        SKIP_INSTALL: YES
        # See the app target's note; required for the widget to read shared
        # state in team-signed builds:
        # CODE_SIGN_ENTITLEMENTS: Widget/Resources/LidlessWidget.entitlements
    dependencies:
      - package: LidlessCore

schemes:
  Lidless:
    build:
      targets:
        Lidless: all
    run:
      config: Debug
    archive:
      config: Release
